name: Test Plugin Installation

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CANDIDATE_PLUGIN_VERSION: 0.5.3
  PREVIOUS_PLUGIN_VERSION: 0.5.2

jobs:
  validate:
    name: Validate marketplaces
    runs-on: ubuntu-latest
    env:
      CODEX_HOME: /tmp/craft-skills-codex-home-validate-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate Claude marketplace manifest
        run: claude plugin validate .

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Validate Codex marketplace manifest
        run: |
          set -euo pipefail
          mkdir -p "$CODEX_HOME"
          codex plugin marketplace add ./
          codex plugin list --marketplace craft-skills --available --json | tee /tmp/craft-skills-codex-available.json
          python3 - <<'PY'
          import json
          with open('/tmp/craft-skills-codex-available.json', 'r', encoding='utf-8') as fh:
              data = json.load(fh)
          names = {plugin.get('name') for plugin in data.get('available', [])}
          if 'craft-skills' not in names:
              raise SystemExit('craft-skills was not listed as an available Codex plugin')
          PY

  test-install:
    name: Test clean Codex install
    runs-on: ubuntu-latest
    needs: validate
    env:
      CODEX_HOME: /tmp/craft-skills-codex-home-clean-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Install Codex plugin
        run: |
          set -euo pipefail
          mkdir -p "$CODEX_HOME"
          codex plugin marketplace add ./
          codex plugin add craft-skills@craft-skills --json | tee /tmp/craft-skills-codex-install.json
          python3 - <<'PY'
          import json
          with open('/tmp/craft-skills-codex-install.json', 'r', encoding='utf-8') as fh:
              data = json.load(fh)
          if data.get('name') != 'craft-skills':
              raise SystemExit(f"unexpected installed plugin payload: {data!r}")
          PY
          codex plugin list --json > /tmp/craft-skills-codex-list.json
          python3 scripts/governance/tools/verify_plugin_install.py \
            --plugin-list /tmp/craft-skills-codex-list.json \
            --expected-version "$CANDIDATE_PLUGIN_VERSION"

  test-upgrade:
    name: Test Codex 0.5.2 to 0.5.3 replacement
    runs-on: ubuntu-latest
    needs: validate
    env:
      CODEX_HOME: /tmp/craft-skills-codex-home-upgrade-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Install previous plugin version
        run: |
          set -euo pipefail
          mkdir -p "$CODEX_HOME"
          previous_ref=$(
            python3 scripts/governance/tools/resolve_plugin_revision.py \
              --manifest .codex-plugin/plugin.json \
              --expected-version "$PREVIOUS_PLUGIN_VERSION"
          )
          previous_tree="${RUNNER_TEMP}/craft-skills-previous"
          git worktree add --detach "$previous_tree" "$previous_ref"
          codex plugin marketplace add "$previous_tree"
          codex plugin add craft-skills@craft-skills --json > /tmp/craft-skills-codex-old-install.json
          codex plugin list --json > /tmp/craft-skills-codex-old-list.json
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          data = json.loads(Path('/tmp/craft-skills-codex-old-list.json').read_text(encoding='utf-8'))
          entries = [item for item in data['installed'] if item.get('pluginId') == 'craft-skills@craft-skills']
          if len(entries) != 1:
              raise SystemExit(f'expected one previous plugin entry, found {len(entries)}')
          entry = entries[0]
          expected_version = os.environ['PREVIOUS_PLUGIN_VERSION']
          if entry.get('installed') is not True or entry.get('enabled') is not True:
              raise SystemExit('previous plugin must be installed and enabled')
          if entry.get('version') != expected_version:
              raise SystemExit(f"expected previous version {expected_version}, found {entry.get('version')!r}")
          source = entry.get('source')
          source_path = source.get('path') if isinstance(source, dict) else None
          if not isinstance(source_path, str) or not Path(source_path).is_dir():
              raise SystemExit('previous plugin source path is missing')
          Path('/tmp/craft-skills-codex-old-source').write_text(source_path, encoding='utf-8')
          PY

      - name: Replace with candidate plugin version
        run: |
          set -euo pipefail
          old_source=$(</tmp/craft-skills-codex-old-source)
          codex plugin remove craft-skills@craft-skills
          codex plugin marketplace remove craft-skills
          codex plugin marketplace add ./
          codex plugin add craft-skills@craft-skills --json > /tmp/craft-skills-codex-new-install.json
          codex plugin list --json > /tmp/craft-skills-codex-new-list.json
          python3 scripts/governance/tools/verify_plugin_install.py \
            --plugin-list /tmp/craft-skills-codex-new-list.json \
            --expected-version "$CANDIDATE_PLUGIN_VERSION" \
            --forbid-source "$old_source"
